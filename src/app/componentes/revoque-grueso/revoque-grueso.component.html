<section id="revoque-grueso" class="calculadora-section">
  <div class="section-head">
    <span class="section-emoji">🧱</span>
    <div>
      <h2 class="section-title">Revoque Grueso</h2>
      <p class="section-desc">Capa base de revoque en paredes — calcular por m²</p>
    </div>
  </div>

  <app-calc-tabla
    subtitulo="Con Cal y Cemento"
    unidadBase="m²"
    [materiales]="matUsandoCalYCemento">
  </app-calc-tabla>

  <app-calc-tabla
    subtitulo="Solo Cemento"
    unidadBase="m²"
    [materiales]="matUsandoCemento">
  </app-calc-tabla>
</section>
