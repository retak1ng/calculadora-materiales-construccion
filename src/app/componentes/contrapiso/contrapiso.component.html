<section id="contrapiso" class="calculadora-section">
  <div class="section-head">
    <span class="section-emoji">🏠</span>
    <div>
      <h2 class="section-title">Contrapiso</h2>
      <p class="section-desc">Base estructural de la losa — calcular por m³ de mezcla</p>
    </div>
  </div>

  <app-calc-tabla
    subtitulo="Con Cal y Cemento"
    unidadBase="m³"
    [materiales]="matCalYCemento">
  </app-calc-tabla>

  <app-calc-tabla
    subtitulo="Solo Cemento"
    unidadBase="m³"
    [materiales]="matCemento">
  </app-calc-tabla>
</section>
